<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Abdul Mohid Kashif — Cybersecurity Analyst</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04060a;
    --panel:#070c11;
    --panel-alt:#0a1119;
    --sidebar:#060a0f;
    --border:#123322;
    --border-bright:#1c5238;
    --green:#43ffa0;
    --green-dim:#5fae86;
    --green-faint:#2e5c47;
    --cyan:#38e6ff;
    --magenta:#ff4fd8;
    --text:#c9ffe4;
    --text-dim:#6d9d87;
    --mono:'JetBrains Mono', monospace;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--bg);overflow-x:hidden;}
  body{font-family:var(--mono);color:var(--text);}

  canvas#matrix{position:fixed;inset:0;width:100%;height:100%;z-index:0;opacity:0.06;pointer-events:none;}
  .scanlines{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
  }

  .app{
    position:relative;z-index:2;
    max-width:980px;margin:20px auto;padding:0 16px 40px;
    min-height:calc(100vh - 40px);
    display:flex;flex-direction:column;
  }

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel-alt);border:1px solid var(--border-bright);border-radius:8px 8px 0 0;
    padding:12px 18px;
  }
  .topbar .brand{font-size:13px;color:var(--green);letter-spacing:0.05em;font-weight:700;}
  .topbar .brand span{color:var(--text-dim);font-weight:400;}
  .topbar .status{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text-dim);}
  .led{display:inline-flex;align-items:center;gap:6px;color:var(--green);}
  .led i{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

  .body-frame{
    display:flex;flex:1;
    border:1px solid var(--border-bright);border-top:none;border-radius:0 0 8px 8px;
    background:var(--panel);
    overflow:hidden;
    min-height:520px;
  }

  .sidebar{
    width:230px;flex-shrink:0;
    background:var(--sidebar);
    border-right:1px solid var(--border);
    padding:14px 0;
  }
  .sidebar .label{
    font-size:10px;color:var(--green-faint);letter-spacing:0.1em;
    padding:0 16px 8px;text-transform:uppercase;
  }
  .script{
    display:flex;align-items:center;justify-content:space-between;
    width:100%;background:transparent;border:none;
    border-left:2px solid transparent;
    color:var(--text-dim);font-family:var(--mono);font-size:12.5px;
    padding:9px 16px;cursor:pointer;text-align:left;
    transition:background .12s ease, color .12s ease, border-color .12s ease;
  }
  .script:hover, .script:focus-visible{background:rgba(67,255,160,0.05);color:var(--text);}
  .script.active{
    color:var(--green);border-left-color:var(--green);
    background:rgba(67,255,160,0.07);
  }
  .script .name::before{content:'$ ';color:var(--green-faint);}
  .script.active .name::before{color:var(--green);}
  .script .flag{font-size:9px;color:var(--green-faint);}
  .script.active .flag{color:var(--cyan);}

  .main{
    flex:1;display:flex;flex-direction:column;min-width:0;
  }
  .path-bar{
    font-size:11.5px;color:var(--text-dim);
    padding:12px 20px;border-bottom:1px solid var(--border);
    background:var(--panel-alt);
  }
  .path-bar .cwd{color:var(--cyan);}
  .path-bar .exe{color:var(--green);}

  .content{
    padding:20px 22px 24px;
    font-size:13.5px;line-height:1.7;
    overflow-y:auto;flex:1;
  }
  .content::-webkit-scrollbar{width:8px;}
  .content::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:4px;}
  .content::-webkit-scrollbar-track{background:transparent;}

  .line{white-space:pre-wrap;word-break:break-word;margin-bottom:4px;opacity:0;animation:fadein .18s ease forwards;}
  @keyframes fadein{to{opacity:1;}}
  .l-dim{color:var(--text-dim);}
  .l-cyan{color:var(--cyan);}
  .l-magenta{color:var(--magenta);}
  .l-green{color:var(--green);}
  .l-heading{color:var(--green);font-weight:700;font-size:15px;margin-bottom:8px;letter-spacing:0.02em;}

  a{color:var(--cyan);text-decoration:underline;text-underline-offset:2px;}
  a:hover, a:focus-visible{color:var(--magenta);}

  .tag{
    display:inline-block;font-size:10.5px;padding:1px 7px;border-radius:3px;
    border:1px solid currentColor;letter-spacing:0.05em;margin-right:6px;vertical-align:1px;
  }
  .tag.progress{color:var(--cyan);}
  .tag.planned{color:var(--text-dim);}
  .tag.done{color:var(--green);}

  .cursor-blink{
    display:inline-block;width:7px;height:13px;background:var(--green);
    vertical-align:-2px;margin-left:2px;animation:blink 1s step-end infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  .footer-links{
    display:flex;flex-wrap:wrap;gap:10px;
    padding:14px 22px 18px;border-top:1px solid var(--border);
    background:var(--panel-alt);
  }
  .flink{
    font-size:11.5px;color:var(--text-dim);border:1px solid var(--border-bright);
    padding:6px 12px;border-radius:3px;text-decoration:none;
    transition:color .12s ease, border-color .12s ease;
  }
  .flink:hover, .flink:focus-visible{color:var(--green);border-color:var(--green);}

  @media (prefers-reduced-motion:reduce){
    .led{animation:none;}
    .cursor-blink{animation:none;}
    .line{opacity:1;animation:none;}
    canvas#matrix{display:none;}
  }

  @media (max-width:760px){
    .body-frame{flex-direction:column;min-height:0;}
    .sidebar{
      width:100%;display:flex;overflow-x:auto;padding:10px 8px;
      border-right:none;border-bottom:1px solid var(--border);
      gap:4px;-webkit-overflow-scrolling:touch;
    }
    .sidebar::-webkit-scrollbar{display:none;}
    .sidebar .label{display:none;}
    .script{
      flex-shrink:0;border-left:none;border-bottom:2px solid transparent;
      padding:8px 12px;white-space:nowrap;
    }
    .script.active{border-left:none;border-bottom-color:var(--green);}
    .content{max-height:52vh;padding:16px 16px 18px;font-size:12.5px;}
    .path-bar{padding:10px 14px;font-size:11px;}
    .footer-links{padding:12px 14px 14px;}
  }
</style>
</head>
<body>

<canvas id="matrix" aria-hidden="true"></canvas>
<div class="scanlines" aria-hidden="true"></div>

<div class="app">
  <div class="topbar">
    <div class="brand">MKTECHLAB30<span>:// abdul mohid kashif</span></div>
    <div class="status">
      <span class="led"><i></i>SECURE SESSION</span>
    </div>
  </div>

  <div class="body-frame">
    <nav class="sidebar" aria-label="Section scripts">
      <div class="label">/usr/scripts</div>
      <button class="script" data-key="about"><span class="name">about.sh</span><span class="flag">idle</span></button>
      <button class="script" data-key="learning"><span class="name">learning.sh</span><span class="flag">idle</span></button>
      <button class="script" data-key="projects"><span class="name">projects.sh</span><span class="flag">idle</span></button>
      <button class="script" data-key="certs"><span class="name">certs.sh</span><span class="flag">idle</span></button>
      <button class="script" data-key="resume"><span class="name">resume.sh</span><span class="flag">idle</span></button>
      <button class="script" data-key="contact"><span class="name">contact.sh</span><span class="flag">idle</span></button>
    </nav>

    <div class="main">
      <div class="path-bar"><span class="cwd">~/scripts</span> $ ./<span class="exe" id="pathExe">about.sh</span></div>
      <div class="content" id="content" role="log" aria-live="polite"></div>
      <div class="footer-links">
        <a class="flink" href="mailto:mohidkashif1624@gmail.com">email</a>
        <a class="flink" href="https://www.linkedin.com/in/abdul-mohid-kashif-aab38a324" target="_blank" rel="noopener">linkedin</a>
        <a class="flink" href="https://github.com/mktechlab30" target="_blank" rel="noopener">github</a>
        <a class="flink" href="/resume.pdf" target="_blank" rel="noopener">resume.pdf ↗</a>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const contentEl = document.getElementById('content');
  const pathExe = document.getElementById('pathExe');
  const scripts = document.querySelectorAll('.script');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const data = {
    about: {
      file: 'about.sh',
      lines: [
        { text: '// about', cls: 'l-heading' },
        { text: "I'm early in my transition into cybersecurity, currently focused on building a strong foundation in networking, systems, and security operations.", cls: 'l-dim' },
        { text: "I'm working through structured coursework and hands-on labs, and this site tracks that progress in the open — including the projects, not just the finished results.", cls: 'l-dim' },
        { text: '', cls: '' },
        { text: 'Currently pursuing a BS in Computer Engineering alongside self-directed security training. Open to entry-level SOC/analyst roles and internships.', cls: 'l-dim' },
      ],
    },
    learning: {
      file: 'learning.sh',
      lines: [
        { text: '// learning log', cls: 'l-heading' },
        { text: '<span class="tag progress">IN PROGRESS</span> Google Cybersecurity Professional Certificate', cls: '' },
        { text: '  Coursera — 8-course series', cls: 'l-dim' },
        { text: '<span class="tag planned">PLANNED</span> TryHackMe — Pre Security path', cls: '' },
        { text: '  Networking &amp; security fundamentals', cls: 'l-dim' },
        { text: '<span class="tag planned">PLANNED</span> Home lab — network + SIEM basics', cls: '' },
        { text: '  VirtualBox, pfSense, Security Onion', cls: 'l-dim' },
      ],
    },
    projects: {
      file: 'projects.sh',
      lines: [
        { text: '// projects', cls: 'l-heading' },
        { text: '<span class="tag planned">PLANNED</span> home-lab-network-monitoring', cls: '' },
        { text: '  Set up a small virtual network, generate traffic, and detect anomalies using a SIEM.', cls: 'l-dim' },
        { text: '<span class="tag planned">PLANNED</span> phishing-email-analysis', cls: '' },
        { text: '  Break down a sample phishing email — headers, links, and red flags — as a triage report.', cls: 'l-dim' },
        { text: '<span class="tag planned">PLANNED</span> tryhackme-writeup', cls: '' },
        { text: '  Walkthrough of a completed room, focused on methodology and reasoning, not just the flags.', cls: 'l-dim' },
      ],
    },
    certs: {
      file: 'certs.sh',
      lines: [
        { text: '// certifications', cls: 'l-heading' },
        { text: '<span class="tag progress">IN PROGRESS</span> Google Cybersecurity Professional Certificate — Coursera', cls: '' },
      ],
    },
    resume: {
      file: 'resume.sh',
      lines: [
        { text: '// resume', cls: 'l-heading' },
        { text: 'Education:', cls: 'l-cyan' },
        { text: '  BS in Computer Engineering — Sir Syed University of Engineering &amp; Technology (2024–2028, in progress)', cls: 'l-dim' },
        { text: '  Intermediate — College for Advanced Studies (2021–2023)', cls: 'l-dim' },
        { text: '', cls: '' },
        { text: 'Technical skills (in development):', cls: 'l-cyan' },
        { text: '  CIA triad &amp; security fundamentals, TCP/IP &amp; networking, firewalls &amp; VPNs, Linux CLI, Python (scripting basics), SQL, SIEM concepts (Splunk), log analysis, incident response fundamentals', cls: 'l-dim' },
        { text: '', cls: '' },
        { text: 'Soft skills:', cls: 'l-cyan' },
        { text: '  Communication, analytical problem-solving, time management, independent learning', cls: 'l-dim' },
        { text: '', cls: '' },
        { text: 'Languages: English (Fluent) · Urdu (Native)', cls: 'l-dim' },
        { text: '', cls: '' },
        { text: '→ <a href="/resume.pdf" target="_blank" rel="noopener">Download full resume (PDF)</a>', cls: 'l-green' },
      ],
    },
    contact: {
      file: 'contact.sh',
      lines: [
        { text: '// contact', cls: 'l-heading' },
        { text: 'Open to entry-level SOC/analyst roles and internships. Reach out any time.', cls: 'l-dim' },
        { text: '', cls: '' },
        { text: 'email     <a href="mailto:mohidkashif1624@gmail.com">mohidkashif1624@gmail.com</a>', cls: '' },
        { text: 'linkedin  <a href="https://www.linkedin.com/in/abdul-mohid-kashif-aab38a324" target="_blank" rel="noopener">linkedin.com/in/abdul-mohid-kashif</a>', cls: '' },
        { text: 'github    <a href="https://github.com/mktechlab30" target="_blank" rel="noopener">github.com/mktechlab30</a>', cls: '' },
      ],
    },
  };

  let renderToken = 0;

  function runScript(key){
    const entry = data[key];
    if(!entry) return;

    scripts.forEach(s => {
      const active = s.dataset.key === key;
      s.classList.toggle('active', active);
      s.querySelector('.flag').textContent = active ? 'running' : 'idle';
    });
    pathExe.textContent = entry.file;

    const myToken = ++renderToken;
    contentEl.innerHTML = '';

    if(reduceMotion){
      entry.lines.forEach(l => {
        const div = document.createElement('div');
        div.className = 'line ' + (l.cls || '');
        div.style.opacity = 1;
        div.innerHTML = l.text;
        contentEl.appendChild(div);
      });
      return;
    }

    let i = 0;
    function next(){
      if(myToken !== renderToken) return;
      if(i >= entry.lines.length) return;
      const l = entry.lines[i];
      const div = document.createElement('div');
      div.className = 'line ' + (l.cls || '');
      div.innerHTML = l.text;
      contentEl.appendChild(div);
      i++;
      setTimeout(next, 55);
    }
    next();
  }

  scripts.forEach(s => {
    s.addEventListener('click', () => runScript(s.dataset.key));
  });

  runScript('about');

  const canvas = document.getElementById('matrix');
  if(!reduceMotion){
    const ctx = canvas.getContext('2d');
    let w, h, cols, drops;
    const chars = 'アイウエオカキクケコサシスセソ0123456789ABCDEF';
    function resize(){
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      cols = Math.floor(w / 16);
      drops = new Array(cols).fill(1);
    }
    resize();
    window.addEventListener('resize', resize);
    function draw(){
      ctx.fillStyle = 'rgba(4,6,10,0.08)';
      ctx.fillRect(0,0,w,h);
      ctx.fillStyle = '#43ffa0';
      ctx.font = '14px monospace';
      for(let i=0;i<drops.length;i++){
        const text = chars[Math.floor(Math.random()*chars.length)];
        ctx.fillText(text, i*16, drops[i]*16);
        if(drops[i]*16 > h && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 60);
  }
})();
</script>

</body>
</html>
